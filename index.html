<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Comanda · Típico Mojanero</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#F3E4C8;
    --surface:#FFFBF2;
    --surface-2:#F7ECD3;
    --surface-3:#EFDCC0;
    --accent-mango:#E8A93A;
    --accent-mango-ink:#3D2314;
    --accent-achiote:#C1401C;
    --fresh:#4C7A3D;
    --warn:#A8681A;
    --text:#3D2314;
    --text-muted:#8B6F52;
    --border:#E0C89C;
    --radius:16px;
    --radius-sm:10px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse at top left, rgba(232,169,58,.18), transparent 55%),
      radial-gradient(ellipse at bottom right, rgba(193,64,28,.10), transparent 50%),
      var(--bg-deep);
    color:var(--text);
    font-family:'Nunito',system-ui,sans-serif;
    min-height:100vh;
    padding-bottom:96px;
    -webkit-tap-highlight-color:transparent;
  }
  .brand{font-family:'Pacifico',cursive;font-weight:400;}
  button{font-family:inherit;}
  ::selection{background:var(--accent-mango);color:var(--accent-mango-ink);}
  :focus-visible{outline:3px solid var(--accent-mango);outline-offset:2px;}

  /* ---------- Header ---------- */
  header{
    padding:22px 18px 16px;
    position:relative;
    overflow:hidden;
    border-bottom:1px solid var(--border);
  }
  header::before{
    content:"";
    position:absolute;
    inset:0;
    background:
      radial-gradient(120% 140% at 100% -20%, rgba(232,169,58,.20), transparent 55%),
      radial-gradient(120% 140% at -10% 120%, rgba(193,64,28,.14), transparent 55%);
    pointer-events:none;
  }
  .brand-row{display:flex;align-items:baseline;gap:10px;position:relative;}
  .brand{font-size:26px;letter-spacing:.2px;margin:0;color:var(--accent-achiote);}
  .brand em{font-style:normal;color:var(--accent-mango);}
  .tagline{margin:4px 0 0;color:var(--text-muted);font-size:13px;letter-spacing:.3px;text-transform:uppercase;position:relative;}
  .header-actions{position:absolute;top:20px;right:18px;display:flex;gap:8px;align-items:center;z-index:2;}
  .rol-badge{font-size:11px;background:var(--surface-3);color:var(--text-muted);padding:4px 10px;border-radius:999px;font-weight:700;white-space:nowrap;}
  .conexion-badge{font-size:11px;background:var(--surface-3);color:var(--fresh);padding:4px 10px;border-radius:999px;font-weight:700;white-space:nowrap;transition:color .2s ease, background .2s ease;}
  .conexion-badge.sin-conexion{color:#fff;background:var(--accent-achiote);}
  .btn-salir{background:none;border:1px solid var(--border);color:var(--text-muted);font-size:11px;padding:5px 10px;border-radius:999px;cursor:pointer;font-weight:700;}

  /* ---------- Tabs ---------- */
  nav.tabs{
    display:flex;
    gap:8px;
    padding:14px 18px 0;
    position:sticky;
    top:0;
    background:var(--bg-deep);
    z-index:20;
  }
  .tab-btn{
    flex:1;
    padding:12px 10px;
    border:1px solid var(--border);
    background:var(--surface);
    color:var(--text-muted);
    border-radius:var(--radius-sm) var(--radius-sm) 0 0;
    font-weight:700;
    font-size:14px;
    cursor:pointer;
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
  }
  .tab-btn.activo{background:var(--surface-3);color:var(--text);border-bottom-color:var(--surface-3);}
  .tab-badge{
    background:var(--accent-achiote);
    color:#fff;
    font-size:11px;
    font-weight:800;
    min-width:20px;
    height:20px;
    border-radius:10px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    padding:0 5px;
  }

  main{padding:0 18px 24px;max-width:900px;margin:0 auto;}
  .vista{display:none;padding-top:18px;}
  .vista.activa{display:block;}

  /* ---------- Pedido: categorías ---------- */
  .chips{
    display:flex;
    gap:8px;
    overflow-x:auto;
    padding:2px 2px 12px;
    scrollbar-width:none;
  }
  .chips::-webkit-scrollbar{display:none;}
  .chip{
    flex:0 0 auto;
    padding:9px 16px;
    border-radius:999px;
    border:1px solid var(--border);
    background:var(--surface);
    color:var(--text-muted);
    font-weight:600;
    font-size:13.5px;
    cursor:pointer;
    white-space:nowrap;
  }
  .chip.activa{background:var(--accent-mango);color:var(--accent-mango-ink);border-color:var(--accent-mango);}

  .items-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(148px,1fr));
    gap:10px;
  }
  .item-card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius-sm);
    padding:14px 12px;
    text-align:left;
    cursor:pointer;
    color:var(--text);
    display:flex;
    flex-direction:column;
    gap:10px;
    min-height:84px;
    transition:transform .08s ease, background .15s ease;
  }
  .item-card:active{transform:scale(.96);background:var(--surface-3);}
  .item-card .nombre{font-weight:700;font-size:14px;line-height:1.25;}
  .item-card .precio{font-weight:600;color:var(--fresh);font-size:13.5px;}
  .item-card .qty-tag{
    align-self:flex-end;
    background:var(--accent-achiote);
    color:#fff;
    font-size:11px;
    font-weight:800;
    padding:2px 8px;
    border-radius:999px;
    margin-top:-30px;
  }

  .section-title{
    display:block;
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:1px;
    color:var(--text-muted);
    margin:0 0 10px;
    font-weight:700;
  }

  /* ---------- Resumen / carrito ---------- */
  .resumen-bar{
    position:fixed;
    left:0;right:0;bottom:0;
    background:var(--surface-2);
    border-top:1px solid var(--border);
    z-index:30;
    box-shadow:0 -8px 24px rgba(0,0,0,.35);
  }
  .resumen-toggle{
    width:100%;
    background:none;
    border:none;
    color:var(--text);
    padding:14px 18px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    font-weight:700;
    font-size:14.5px;
    cursor:pointer;
  }
  .resumen-toggle .total{color:var(--fresh);}
  .resumen-panel{max-height:0;overflow:hidden;transition:max-height .25s ease;}
  .resumen-panel.abierto{max-height:70vh;overflow-y:auto;}
  .resumen-inner{padding:0 18px 18px;}
  .campo-mesa{
    display:flex;
    gap:10px;
    margin-bottom:14px;
    flex-wrap:wrap;
  }
  .campo-mesa input[type=text]{
    flex:1;
    min-width:120px;
    background:var(--bg-deep);
    border:1px solid var(--border);
    color:var(--text);
    padding:10px 12px;
    border-radius:var(--radius-sm);
    font-size:15px;
  }
  .llevar-btn{
    padding:10px 14px;
    border-radius:var(--radius-sm);
    border:1px solid var(--border);
    background:var(--bg-deep);
    color:var(--text-muted);
    font-weight:700;
    font-size:13px;
    cursor:pointer;
  }
  .llevar-btn.activo{background:var(--accent-mango);color:var(--accent-mango-ink);border-color:var(--accent-mango);}

  .linea-item{
    display:flex;
    align-items:flex-start;
    gap:10px;
    padding:10px 0;
    border-bottom:1px solid var(--border);
  }
  .linea-item .info{flex:1;}
  .linea-item .info .n{font-weight:700;font-size:14px;}
  .linea-item .info .p{color:var(--text-muted);font-size:12.5px;}
  .linea-item .stepper{margin-top:2px;}
  .input-nota{
    width:100%;
    margin-top:6px;
    padding:7px 9px;
    background:var(--bg-deep);
    border:1px solid var(--border);
    border-radius:8px;
    color:var(--text);
    font-size:12.5px;
  }
  .input-nota::placeholder{color:var(--text-muted);opacity:.7;}
  .nota-item{color:var(--warn);font-style:italic;font-weight:600;}
  .stepper{display:flex;align-items:center;gap:8px;}
  .stepper button{
    width:28px;height:28px;
    border-radius:50%;
    border:1px solid var(--border);
    background:var(--bg-deep);
    color:var(--text);
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    line-height:1;
  }
  .stepper .qty{min-width:18px;text-align:center;font-weight:700;}

  .btn-enviar{
    width:100%;
    margin-top:14px;
    padding:15px;
    border:none;
    border-radius:var(--radius-sm);
    background:var(--accent-achiote);
    color:#fff;
    font-weight:800;
    font-size:15px;
    letter-spacing:.3px;
    cursor:pointer;
  }
  .btn-enviar:disabled{background:var(--surface-3);color:var(--text-muted);cursor:not-allowed;}
  .vacio-msg{color:var(--text-muted);font-size:13.5px;padding:8px 0;}

  /* ---------- Cocina ---------- */
  .cocina-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
    gap:14px;
  }
  .ticket{
    background:var(--surface);
    border:1px solid var(--border);
    border-left:6px solid var(--fresh);
    border-radius:var(--radius);
    padding:14px 16px;
  }
  .ticket.aviso{border-left-color:var(--warn);}
  .ticket.urgente{border-left-color:var(--accent-achiote);animation:pulso 1.6s ease-in-out infinite;}
  @media (prefers-reduced-motion: reduce){.ticket.urgente{animation:none;}}
  @keyframes pulso{
    0%,100%{box-shadow:0 0 0 rgba(193,64,28,0);}
    50%{box-shadow:0 0 0 6px rgba(193,64,28,.16);}
  }
  .ticket-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;}
  .ticket-mesa{font-family:'Pacifico',cursive;font-weight:400;font-size:20px;}
  .ticket-tiempo{
    font-size:11.5px;
    font-weight:800;
    padding:3px 9px;
    border-radius:999px;
    background:var(--bg-deep);
    color:var(--text-muted);
    white-space:nowrap;
  }
  .ticket.aviso .ticket-tiempo{color:var(--warn);}
  .ticket.urgente .ticket-tiempo{color:var(--accent-achiote);}
  .ticket-empleado{font-size:11.5px;color:var(--text-muted);margin-bottom:10px;}
  .ticket-items{list-style:none;margin:0 0 12px;padding:0;font-size:13.5px;}
  .ticket-items li{padding:3px 0;display:flex;gap:6px;}
  .ticket-items li .cant{color:var(--accent-achiote);font-weight:800;min-width:22px;}
  .ticket-nota{font-size:12px;color:var(--text-muted);font-style:italic;margin:-6px 0 12px;}
  .btn-listo{
    width:100%;
    padding:10px;
    border:none;
    border-radius:var(--radius-sm);
    background:var(--fresh);
    color:#fff;
    font-weight:800;
    font-size:13.5px;
    cursor:pointer;
  }
  .btn-cobrar{
    width:100%;
    padding:10px;
    border:none;
    border-radius:var(--radius-sm);
    background:var(--accent-mango);
    color:var(--accent-mango-ink);
    font-weight:800;
    font-size:13.5px;
    cursor:pointer;
  }
  .ticket.lista-cobro{border-left-color:var(--accent-mango);}
  .ticket-acciones-sec{display:flex;gap:8px;margin-bottom:8px;}
  .btn-editar,.btn-cancelar{
    flex:1;
    padding:8px;
    border-radius:var(--radius-sm);
    font-weight:700;
    font-size:12.5px;
    cursor:pointer;
  }
  .btn-editar{background:var(--surface-3);border:1px solid var(--border);color:var(--text);}
  .btn-cancelar{background:none;border:1px solid var(--accent-achiote);color:var(--accent-achiote);}
  .ticket-editado{background:rgba(232,169,58,.18);border:1px solid var(--warn);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:10px;}
  .ticket-editado-titulo{font-weight:800;font-size:12.5px;color:var(--warn);margin-bottom:4px;}
  .ticket-diff{list-style:none;margin:0 0 8px;padding:0;font-size:12.5px;}
  .ticket-diff li{padding:2px 0;}
  .btn-visto{width:100%;padding:7px;border:1px solid var(--warn);background:none;color:var(--warn);border-radius:var(--radius-sm);font-weight:700;font-size:12px;cursor:pointer;}
  .cocina-vacia{
    text-align:center;
    padding:60px 20px;
    color:var(--text-muted);
  }
  .cocina-vacia .emoji{font-size:34px;display:block;margin-bottom:10px;}

  /* ---------- Empleados (solo admin) ---------- */
  .form-empleado{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
  .form-empleado input{flex:1;min-width:100px;padding:10px 12px;background:var(--bg-deep);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:14px;}
  .btn-agregar-empleado{padding:10px 16px;border:none;border-radius:var(--radius-sm);background:var(--accent-mango);color:var(--accent-mango-ink);font-weight:800;font-size:13.5px;cursor:pointer;white-space:nowrap;}
  .empleado-row{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:8px;}
  .empleado-row .info{flex:1;}
  .empleado-row .nombre{font-weight:700;font-size:14.5px;}
  .empleado-row .pin{color:var(--text-muted);font-size:12.5px;font-family:monospace;letter-spacing:2px;}
  .btn-eliminar{background:none;border:1px solid var(--border);color:var(--accent-achiote);width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:14px;flex:0 0 auto;}

  /* ---------- Login ---------- */
  .login-overlay{
    position:fixed;inset:0;z-index:100;
    background:var(--bg-deep);
    display:flex;align-items:center;justify-content:center;
    padding:20px;
  }
  .login-card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:32px 24px;
    width:100%;max-width:360px;
    text-align:center;
  }
  .login-card .brand{font-size:24px;margin-bottom:4px;}
  .login-card .tagline{position:static;margin-bottom:22px;}
  .login-tabs{display:flex;gap:8px;margin-bottom:20px;}
  .login-tabs button{
    flex:1;padding:10px;border-radius:var(--radius-sm);
    border:1px solid var(--border);background:var(--bg-deep);
    color:var(--text-muted);font-weight:700;font-size:13px;cursor:pointer;
  }
  .login-tabs button.activo{background:var(--accent-mango);color:var(--accent-mango-ink);border-color:var(--accent-mango);}
  .login-form input{
    width:100%;margin-bottom:10px;padding:12px;
    background:var(--bg-deep);border:1px solid var(--border);
    border-radius:var(--radius-sm);color:var(--text);font-size:15px;
    text-align:center;
  }
  .btn-entrar{
    width:100%;padding:13px;border:none;border-radius:var(--radius-sm);
    background:var(--accent-achiote);color:#fff;font-weight:800;font-size:14.5px;cursor:pointer;margin-top:4px;
  }
  .login-error{color:var(--accent-achiote);font-size:13px;margin-top:12px;min-height:16px;}

  /* ---------- Modal: editar pedido ---------- */
  .modal-overlay{
    position:fixed;inset:0;
    background:rgba(0,0,0,.6);
    z-index:80;
    display:none;
    align-items:flex-end;
    justify-content:center;
  }
  .modal-overlay.abierto{display:flex;}
  .modal-card{
    background:var(--bg-deep);
    width:100%;max-width:640px;max-height:88vh;
    border-radius:var(--radius) var(--radius) 0 0;
    display:flex;flex-direction:column;
    overflow:hidden;
    border:1px solid var(--border);
  }
  .modal-header{display:flex;justify-content:space-between;align-items:center;padding:16px 18px;border-bottom:1px solid var(--border);}
  .modal-header h3{margin:0;font-size:17px;}
  .btn-cerrar-modal{background:none;border:1px solid var(--border);color:var(--text-muted);width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:14px;flex:0 0 auto;}
  .modal-body{padding:16px 18px;overflow-y:auto;flex:1;}
  .modal-footer{padding:14px 18px;border-top:1px solid var(--border);}

  /* ---------- Modal: cobrar pedido ---------- */
  .cobro-total{font-size:30px;font-weight:400;color:var(--fresh);margin:0 0 18px;font-family:'Pacifico',cursive;}
  .metodos-pago{display:flex;gap:8px;margin-bottom:16px;}
  .metodo-btn{
    flex:1;
    padding:14px 6px;
    border-radius:var(--radius-sm);
    border:2px solid var(--border);
    background:var(--surface);
    color:var(--text);
    font-weight:700;
    font-size:12.5px;
    cursor:pointer;
    text-align:center;
  }
  .metodo-btn.activo{border-color:var(--accent-mango);background:rgba(232,169,58,.15);}
  .campo-mixto{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .campo-mixto label{width:70px;flex:0 0 auto;font-weight:700;font-size:13.5px;}
  .campo-mixto input{
    flex:1;
    padding:10px 12px;
    border-radius:var(--radius-sm);
    border:1px solid var(--border);
    background:var(--bg-deep);
    color:var(--text);
    font-size:15px;
  }
  .mixto-aviso{font-size:12.5px;color:var(--accent-achiote);margin:6px 0 0;min-height:16px;}

  /* ---------- FAB + pantalla completa: nuevo pedido ---------- */
  .fab-nuevo-pedido{
    position:fixed;
    right:20px;bottom:24px;
    width:60px;height:60px;
    border-radius:50%;
    border:none;
    background:var(--accent-achiote);
    color:#fff;
    font-size:30px;
    font-weight:400;
    line-height:1;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 8px 20px rgba(193,64,28,.45);
    cursor:pointer;
    z-index:40;
  }
  .pantalla-nuevo-pedido{
    display:none;
    flex-direction:column;
    position:fixed;inset:0;
    z-index:90;
    background:var(--bg-deep);
    overflow-y:auto;
  }
  .pantalla-nuevo-pedido.abierta{display:flex;}
  .np-header{
    position:sticky;top:0;
    display:flex;align-items:center;justify-content:space-between;
    padding:16px 18px;
    background:var(--bg-deep);
    border-bottom:1px solid var(--border);
    z-index:5;
  }
  .np-header h2{margin:0;font-size:22px;font-family:'Pacifico',cursive;font-weight:400;color:var(--accent-achiote);}
  .btn-cerrar-np{background:none;border:1px solid var(--border);color:var(--text-muted);width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:15px;flex:0 0 auto;}
  .np-body{padding:16px 18px 110px;max-width:900px;margin:0 auto;width:100%;}

  .toast{
    position:fixed;
    top:16px;left:50%;
    transform:translateX(-50%) translateY(-140%);
    background:var(--fresh);
    color:#fff;
    padding:12px 20px;
    border-radius:999px;
    font-weight:800;
    font-size:13.5px;
    z-index:150;
    transition:transform .25s ease;
    box-shadow:0 8px 20px rgba(0,0,0,.35);
  }
  .toast.mostrar{transform:translateX(-50%) translateY(0);}

  @media(min-width:720px){
    .resumen-panel.abierto{max-height:80vh;}
    .cocina-grid{grid-template-columns:repeat(auto-fill,minmax(260px,1fr));}
    .modal-overlay{align-items:center;}
    .modal-card{border-radius:var(--radius);max-height:80vh;}
  }
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div class="login-overlay" id="pantalla-login">
  <div class="login-card">
    <h1 class="brand">Típico <em>Mojanero</em></h1>
    <p class="tagline">Comanda digital</p>
    <div class="login-tabs">
      <button class="activo" data-tab="empleado" onclick="mostrarLoginTab('empleado')">Soy empleado</button>
      <button data-tab="admin" onclick="mostrarLoginTab('admin')">Soy admin</button>
    </div>
    <div class="login-form" id="login-empleado">
      <input type="password" inputmode="numeric" id="input-pin" placeholder="PIN" maxlength="6">
      <button class="btn-entrar" onclick="loginEmpleado()">Entrar</button>
    </div>
    <div class="login-form" id="login-admin" style="display:none;">
      <input type="email" id="input-email" placeholder="Correo">
      <input type="password" id="input-password" placeholder="Contraseña">
      <button class="btn-entrar" onclick="loginAdmin()">Entrar</button>
    </div>
    <p class="login-error" id="login-error"></p>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="app-container" style="display:none;">
  <header>
    <div class="header-actions">
      <span class="conexion-badge" id="estado-conexion">🟢 En línea</span>
      <span class="rol-badge" id="rol-badge"></span>
      <button class="btn-salir" onclick="salir()">Salir</button>
    </div>
    <div class="brand-row">

          <span class="nombre">${it.n}</span>

  function agregarItem(cat, n, p){

    pedidoActual.items[key].qty++;

    renderResumen();
    if(!document.getElementById('resumen-panel').classList.contains('abierto')){
      mostrarToast(n + ' agregado');

  function cambiarQty(key, delta){
    const it = pedidoActual.items[key];
    if(!it) return;
    it.qty += delta;
    if(it.qty <= 0) delete pedidoActual.items[key];
    renderItems();
    renderResumen();

  function cambiarNota(key, valor){

  function toggleLlevar(){

  function enviarComanda(){
    const items = Object.values(pedidoActual.items).map(i=>({n:i.n, p:i.p, qty:i.qty, nota:i.nota||''}));
    if(items.length === 0) return;
    const total = items.reduce((s,i)=>s+i.qty*i.p,0);
    // Generamos la referencia primero para poder marcarla como "pendiente"
    // de inmediato — si no hay conexión, Firebase la aplica localmente
    // igual (optimista) y la reenvía sola cuando vuelva la señal.
    const nuevaRef = db.ref('comandas').push();
    pendientes[nuevaRef.key] = true;
    nuevaRef.set({
      mesa: pedidoActual.llevar ? 'Para llevar' : ('Mesa ' + pedidoActual.mesa.trim()),
      items,
      total,
      creada: firebase.database.ServerValue.TIMESTAMP,
      tomadoPor: empleadoActual ? empleadoActual.nombre : 'Admin',
    }, ()=>{
      // Se llama cuando el servidor confirma la escritura (puede tardar
      // si estaba sin conexión y se envía al reconectar).

      if(vistaActual === 'cocina') renderCocina();

    pedidoActual = { mesa:"", llevar:false, items:{} };

  // ---------------------------------------------------------
  // SONIDO DE ALERTA — COCINA
  // Genera un tono corto tipo "campanita" con Web Audio, sin
  // depender de ningún archivo de audio externo.
  // ---------------------------------------------------------
  let audioCtxCocina = null;
  function getAudioCtxCocina(){
    if(!audioCtxCocina){
      try{ audioCtxCocina = new (window.AudioContext || window.webkitAudioContext)(); }
      catch(e){ audioCtxCocina = null; }
    }
    return audioCtxCocina;
  }

  function sonarAlertaCocina(){
    const ctx = getAudioCtxCocina();
    if(!ctx) return;
    try{
      [880, 1108].forEach((freq, i)=>{
        const t0 = ctx.currentTime + i*0.16;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.0001, t0);
        gain.gain.exponentialRampToValueAtTime(0.35, t0+0.02);
        gain.gain.exponentialRampToValueAtTime(0.0001, t0+0.3);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(t0);
        osc.stop(t0+0.32);
      });
    } catch(e){ /* si el navegador bloquea audio, seguimos sin sonido */ }
  }

  // ---------------------------------------------------------
  // VISTA COCINA (sincronizada en vivo con Realtime Database)
  // ---------------------------------------------------------
  function iniciarListenerComandas(){
    db.ref('comandas').on('value', snap=>{
      comandas = [];
      const idsActuales = new Set();
      snap.forEach(child=>{
        const v = child.val();
        comandas.push({id:child.key, mesa:v.mesa, items:v.items||[], total:v.total, creada:v.creada||Date.now(), tomadoPor:v.tomadoPor, estado:v.estado||'cocina', listaEn:v.listaEn||null});
        idsActuales.add(child.key);
      });
      if(!primeraCargaComandas){
        let hayNuevas = false;
        idsActuales.forEach(id=>{ if(!idsConocidosCocina.has(id)) hayNuevas = true; });
        if(hayNuevas && vistaActual === 'cocina') sonarAlertaCocina();
      }
      idsConocidosCocina = idsActuales;
      primeraCargaComandas = false;
      actualizarBadge();
      if(vistaActual === 'cocina') renderCocina();
    });
  }

  function minutosDesde(ts){ return Math.max(0, Math.floor((Date.now()-ts)/60000)); }

  function nivelUrgencia(min){
    if(min >= 20) return 'urgente';
    if(min >= 10) return 'aviso';
    return '';
  }

  function calcularDiff(anterior, actual){
    const mapAnterior = {};
    (anterior||[]).forEach(i=>{ mapAnterior[i.n] = (mapAnterior[i.n]||0) + i.qty; });
    const mapActual = {};
    (actual||[]).forEach(i=>{ mapActual[i.n] = (mapActual[i.n]||0) + i.qty; });
    const nombres = new Set([...Object.keys(mapAnterior), ...Object.keys(mapActual)]);
    const cambios = [];
    nombres.forEach(n=>{
      const antes = mapAnterior[n] || 0;
      const ahora = mapActual[n] || 0;
      if(ahora > antes) cambios.push(`+${ahora-antes} ${n}`);
      else if(ahora < antes) cambios.push(`−${antes-ahora} ${n}`);
    });
    return cambios;
  }

  function renderCocina(){
    const cont = document.getElementById('grid-cocina');
    if(comandas.length === 0){
      cont.innerHTML = `<div class="cocina-vacia" style="grid-column:1/-1;">
        <span class="emoji">🍳</span>
        Aún no hay comandas activas.<br>Las que se envíen desde "Tomar pedido" aparecen aquí.
      </div>`;
      return;
    }
    const ordenadas = [...comandas].sort((a,b)=>a.creada-b.creada);
    cont.innerHTML = ordenadas.map(c => {
      const listaParaCobrar = c.estado === 'lista';
      const min = listaParaCobrar ? minutosDesde(c.listaEn || c.creada) : minutosDesde(c.creada);
      const nivel = listaParaCobrar ? 'lista-cobro' : nivelUrgencia(min);
      const esPendiente = !!pendientes[c.id];
      return `
      <div class="ticket ${nivel}">
        <div class="ticket-top">
          <span class="ticket-mesa">${c.mesa}</span>
          <span class="ticket-tiempo">${esPendiente ? '🔌 sincronizando…' : (listaParaCobrar ? '✅ lista hace ' + min + ' min' : 'hace ' + min + ' min')}</span>
        </div>
        ${c.tomadoPor ? `<div class="ticket-empleado">Tomó: ${c.tomadoPor}</div>` : ''}
        ${c.editada ? `
          <div class="ticket-editado">
            <div class="ticket-editado-titulo">✏️ Pedido modificado</div>
            <ul class="ticket-diff">
              ${calcularDiff(c.itemsAnterior, c.items).map(cambio=>`<li>${cambio}</li>`).join('')}
            </ul>
            <button class="btn-visto" onclick="marcarVisto('${c.id}')">👁 Visto</button>
          </div>
        ` : ''}
        <ul class="ticket-items">
          ${c.items.map(i=>`<li><span class="cant">${i.qty}×</span> ${i.n}${i.nota ? ` <span class="nota-item">— ${i.nota}</span>` : ''}</li>`).join('')}
        </ul>
        <div class="ticket-acciones-sec">
          <button class="btn-editar" onclick="abrirEdicion('${c.id}')">✏️ Editar</button>
          <button class="btn-cancelar" onclick="cancelarComanda('${c.id}')">✕ Cancelar</button>
        </div>
        ${listaParaCobrar
          ? `<button class="btn-cobrar" onclick="abrirCobro('${c.id}')">💰 Cobrar ${fmt(c.total)}</button>`
          : `<button class="btn-listo" onclick="marcarLista('${c.id}')">✓ Marcar como lista</button>`
        }
      </div>`;
    }).join('');
  }

  function marcarLista(id){
    db.ref('comandas/'+id).update({estado:'lista', listaEn: firebase.database.ServerValue.TIMESTAMP});
    mostrarToast('Pedido listo — falta cobrar 💰');
  }

  function marcarVisto(id){
    db.ref('comandas/'+id).update({editada:false});
  }

  function cancelarComanda(id){
    const c = comandas.find(x=>x.id===id);
    if(!c) return;
    if(!confirm(`¿Cancelar el pedido de ${c.mesa}? Esta acción no se puede deshacer.`)) return;
    db.ref('canceladas/'+id).set({
      mesa: c.mesa,
      items: c.items,
      total: c.total,
      creada: c.creada,
      tomadoPor: c.tomadoPor || null,
      canceladaPor: empleadoActual ? empleadoActual.nombre : 'Admin',
      canceladaEn: firebase.database.ServerValue.TIMESTAMP,
    });
    db.ref('comandas/'+id).remove();
    mostrarToast('Pedido cancelado');
  }

  function actualizarBadge(){
    document.getElementById('badge-cocina').textContent = comandas.length;
  }

  // Refresca los tiempos/urgencia visualmente cada 20s (los datos ya llegan en vivo)
  setInterval(()=>{ if(vistaActual==='cocina') renderCocina(); }, 20000);

  // ---------------------------------------------------------
  // VISTA EMPLEADOS (solo admin)
  // ---------------------------------------------------------
  function iniciarListenerEmpleados(){
    db.ref('empleados').on('value', snap=>{
      empleadosCache = [];
      snap.forEach(child=>{
        empleadosCache.push({id:child.key, nombre:child.val().nombre, pin:child.val().pin});
      });
      if(vistaActual === 'empleados') renderEmpleadosView();
    });
  }

  function renderEmpleadosView(){
    const cont = document.getElementById('lista-empleados');
    cont.innerHTML = empleadosCache.length === 0
      ? '<p class="vacio-msg">Aún no hay empleados registrados. Agrega el primero arriba.</p>'
      : empleadosCache.map(e => `
        <div class="empleado-row">
          <div class="info">
            <div class="nombre">${e.nombre}</div>
            <div class="pin">PIN: ${e.pin}</div>
          </div>
          <button class="btn-eliminar" onclick="eliminarEmpleado('${e.id}')">✕</button>
        </div>`).join('');
  }

  function agregarEmpleado(){
    const nombreInput = document.getElementById('nuevo-empleado-nombre');
    const pinInput = document.getElementById('nuevo-empleado-pin');
    const nombre = nombreInput.value.trim();
    const pin = pinInput.value.trim();
    if(!nombre || !pin) return;
    db.ref('empleados').push({nombre, pin});
    nombreInput.value = '';
    pinInput.value = '';
  }

  function eliminarEmpleado(id){
    db.ref('empleados/'+id).remove();
  }

  // ---------------------------------------------------------
  // MODAL: EDITAR PEDIDO
  // Reutiliza el mismo MENU para agregar/quitar ítems de un
  // pedido que ya se envió a cocina, sin perder su hora de
  // creación ni su lugar en la fila.
  // ---------------------------------------------------------
  function abrirEdicion(id){
    const c = comandas.find(x=>x.id===id);
    if(!c) return;
    const items = {};
    c.items.forEach(it=>{
      let catEncontrada = 'Otros';
      for(const cat of CATEGORIAS){
        if(MENU[cat].some(m=>m.n === it.n)){ catEncontrada = cat; break; }
      }
      const key = claveItem(catEncontrada, it.n);
      items[key] = { n:it.n, p:it.p, qty:it.qty, nota:it.nota||'', cat:catEncontrada };
    });
    edicionActual = { id: c.id, items };
    categoriaActivaEditar = CATEGORIAS[0];
    document.getElementById('modal-editar-titulo').textContent = 'Editar pedido — ' + c.mesa;
    document.getElementById('modal-editar').classList.add('abierto');
    renderCategoriasEditar();
    renderItemsEditar();
    renderListaEditar();
  }

  function cerrarEdicion(){
    edicionActual = null;
    document.getElementById('modal-editar').classList.remove('abierto');
  }

  function renderCategoriasEditar(){
    const cont = document.getElementById('chips-categorias-editar');
    cont.innerHTML = CATEGORIAS.map(c =>
      `<button class="chip ${c===categoriaActivaEditar?'activa':''}" onclick="seleccionarCategoriaEditar('${c.replace(/'/g,"\\'")}')">${c}</button>`
    ).join('');
  }

  function seleccionarCategoriaEditar(c){
    categoriaActivaEditar = c;
    renderCategoriasEditar();
    renderItemsEditar();
  }

  function renderItemsEditar(){
    const cont = document.getElementById('grid-items-editar');
    const items = MENU[categoriaActivaEditar] || [];
    cont.innerHTML = items.map(it => {
      const key = claveItem(categoriaActivaEditar, it.n);
      const enPedido = edicionActual.items[key];
      return `
        <button class="item-card" onclick="agregarItemEditar('${categoriaActivaEditar.replace(/'/g,"\\'")}','${it.n.replace(/'/g,"\\'")}',${it.p})">
          ${enPedido ? `<span class="qty-tag">x${enPedido.qty}</span>` : ''}
          <span class="nombre">${it.n}</span>
          <span class="precio">${fmt(it.p)}</span>
        </button>`;
    }).join('');
  }

  function agregarItemEditar(cat, n, p){
    const key = claveItem(cat, n);
    if(!edicionActual.items[key]) edicionActual.items[key] = {n, p, cat, qty:0, nota:''};
    edicionActual.items[key].qty++;
    renderItemsEditar();
    renderListaEditar();
  }

  function cambiarQtyEditar(key, delta){
    const it = edicionActual.items[key];
    if(!it) return;
    it.qty += delta;
    if(it.qty <= 0) delete edicionActual.items[key];
    renderItemsEditar();
    renderListaEditar();
  }

  function cambiarNotaEditar(key, valor){
    const it = edicionActual.items[key];
    if(!it) return;
    it.nota = valor;
  }

  function renderListaEditar(){
    const cont = document.getElementById('lista-editar');
    const items = Object.values(edicionActual.items);
    cont.innerHTML = items.length === 0
      ? '<p class="vacio-msg">Este pedido quedaría vacío. Agrega al menos un ítem, o mejor cancela el pedido.</p>'
      : items.map(it => {
          const key = claveItem(it.cat, it.n);
          return `
          <div class="linea-item">
            <div class="info">
              <div class="n">${it.n}</div>
              <input type="text" class="input-nota" placeholder="Nota (ej: sin cebolla)" value="${(it.nota||'').replace(/"/g,'&quot;')}" oninput="cambiarNotaEditar('${key.replace(/'/g,"\\'")}', this.value)">
            </div>
            <div class="stepper">
              <button onclick="cambiarQtyEditar('${key.replace(/'/g,"\\'")}',-1)">−</button>
              <span class="qty">${it.qty}</span>
              <button onclick="cambiarQtyEditar('${key.replace(/'/g,"\\'")}',1)">+</button>
            </div>
          </div>`;
        }).join('');
  }

  function guardarEdicion(){
    if(!edicionActual) return;
    const nuevosItems = Object.values(edicionActual.items).map(i=>({n:i.n, p:i.p, qty:i.qty, nota:i.nota||''}));
    if(nuevosItems.length === 0){
      mostrarToast('Agrega al menos un ítem, o cancela el pedido');
      return;
    }
    const total = nuevosItems.reduce((s,i)=>s+i.qty*i.p,0);
    const original = comandas.find(x=>x.id===edicionActual.id);
    db.ref('comandas/'+edicionActual.id).update({
      items: nuevosItems,
      total,
      itemsAnterior: original ? original.items : [],
      editada: true,
    });
    cerrarEdicion();
    mostrarToast('Pedido actualizado ✏️');
  }

  // ---------------------------------------------------------
  // MODAL: COBRAR PEDIDO
  // Cierra un pedido "listo" registrando el método de pago.
  // Crédito llega en el próximo paso, junto con el sistema de
  // deudores — por ahora solo efectivo, Nequi y mixto.
  // ---------------------------------------------------------
  function abrirCobro(id){
    const c = comandas.find(x=>x.id===id);
    if(!c) return;
    pedidoEnCobro = { id: c.id, total: c.total, mesa: c.mesa, metodo: null };
    document.getElementById('modal-cobrar-titulo').textContent = 'Cobrar — ' + c.mesa;
    document.getElementById('cobro-total-texto').textContent = fmt(c.total);
    document.querySelectorAll('.metodo-btn').forEach(b=>b.classList.remove('activo'));
    document.getElementById('mixto-detalle').style.display = 'none';
    document.getElementById('mixto-efectivo').value = '';
    document.getElementById('mixto-nequi').value = '';
    document.getElementById('mixto-aviso').textContent = '';
    document.getElementById('btn-confirmar-cobro').disabled = true;
    document.getElementById('modal-cobrar').classList.add('abierto');
  }

  function cerrarCobro(){
    pedidoEnCobro = null;
    document.getElementById('modal-cobrar').classList.remove('abierto');
  }

  function seleccionarMetodo(metodo){
    if(!pedidoEnCobro) return;
    pedidoEnCobro.metodo = metodo;
    document.querySelectorAll('.metodo-btn').forEach(b=>b.classList.toggle('activo', b.dataset.metodo===metodo));
    const esMixto = metodo === 'mixto';
    document.getElementById('mixto-detalle').style.display = esMixto ? 'block' : 'none';
    if(esMixto){
      validarMixto();
    } else {
      document.getElementById('btn-confirmar-cobro').disabled = false;
    }
  }

  function validarMixto(){
    if(!pedidoEnCobro) return;
    const efectivo = Number(document.getElementById('mixto-efectivo').value) || 0;
    const nequi = Number(document.getElementById('mixto-nequi').value) || 0;
    const suma = efectivo + nequi;
    const aviso = document.getElementById('mixto-aviso');
    const btn = document.getElementById('btn-confirmar-cobro');
    if(suma === pedidoEnCobro.total && suma > 0){
      aviso.textContent = '';
      btn.disabled = false;
    } else {
      aviso.textContent = `La suma debe dar ${fmt(pedidoEnCobro.total)} (llevas ${fmt(suma)})`;
      btn.disabled = true;
    }
  }

  function confirmarCobro(){
    if(!pedidoEnCobro || !pedidoEnCobro.metodo) return;
    const c = comandas.find(x=>x.id===pedidoEnCobro.id);
    if(!c) return;
    const detallePago = pedidoEnCobro.metodo === 'mixto'
      ? { efectivo: Number(document.getElementById('mixto-efectivo').value)||0, nequi: Number(document.getElementById('mixto-nequi').value)||0 }
      : null;
    db.ref('ventas/'+c.id).set({
      mesa: c.mesa,
      items: c.items,
      total: c.total,
      tomadoPor: c.tomadoPor || null,
      creada: c.creada,
      listaEn: c.listaEn || null,
      cerrada: firebase.database.ServerValue.TIMESTAMP,
      metodoPago: pedidoEnCobro.metodo,
      detallePago,
    });
    db.ref('comandas/'+c.id).remove();
    cerrarCobro();
    mostrarToast('Cobro registrado ✅');
  }

  // ---------------------------------------------------------
  // TOAST
  // ---------------------------------------------------------
  let toastTimeout;
  function mostrarToast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('mostrar');
    clearTimeout(toastTimeout);
    toastTimeout = setTimeout(()=>t.classList.remove('mostrar'), 1800);
  }
</script>
</body>
</html>
